services:
  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      - REPLICA_ADDRS=replica1:9001,replica2:9001,replica3:9001
      - REPLICA_HTTP=http://replica1:8081,http://replica2:8081,http://replica3:8081
      - GATEWAY_PORT=8080
      - GATEWAY_URL=http://gateway:8080
      - LOG_LEVEL=info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      replica1:
        condition: service_healthy
      replica2:
        condition: service_healthy
      replica3:
        condition: service_healthy
    networks:
      - raft-net
    restart: unless-stopped

  replica1:
    build: ./replica
    environment:
      - REPLICA_ID=replica1
      - PEERS=replica2:9001,replica3:9001
      - GRPC_PORT=9001
      - HTTP_PORT=8081
      - DATA_DIR=/data
      - LOG_LEVEL=info
      - GATEWAY_URL=http://gateway:8080
    volumes:
      - ./logs/replica1:/data
    ports:
      - "9001:9001"
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - raft-net
    restart: unless-stopped

  replica2:
    build: ./replica
    environment:
      - REPLICA_ID=replica2
      - PEERS=replica1:9001,replica3:9001
      - GRPC_PORT=9001
      - HTTP_PORT=8081
      - DATA_DIR=/data
      - LOG_LEVEL=info
      - GATEWAY_URL=http://gateway:8080
    volumes:
      - ./logs/replica2:/data
    ports:
      - "9002:9001"
      - "8082:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - raft-net
    restart: unless-stopped

  replica3:
    build: ./replica
    environment:
      - REPLICA_ID=replica3
      - PEERS=replica1:9001,replica2:9001
      - GRPC_PORT=9001
      - HTTP_PORT=8081
      - DATA_DIR=/data
      - LOG_LEVEL=info
      - GATEWAY_URL=http://gateway:8080
    volumes:
      - ./logs/replica3:/data
    ports:
      - "9003:9001"
      - "8083:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - raft-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    networks:
      - raft-net
    depends_on:
      - gateway
    restart: unless-stopped

networks:
  raft-net:
    driver: bridge
